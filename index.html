<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inspeccion de Racks</title>
    <style>
      :root {
        color: #17202a;
        background: #f3f6f8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: #f3f6f8;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .home-view {
        position: relative;
        display: grid;
        align-content: center;
        gap: 32px;
        min-height: 100vh;
        padding: 32px;
        background:
          linear-gradient(90deg, rgba(17, 32, 44, 0.9), rgba(17, 32, 44, 0.66)),
          url("https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1800&q=80") center / cover;
        color: #ffffff;
      }

      .hero-brand {
        position: absolute;
        top: 28px;
        left: 32px;
        display: inline-flex;
        align-items: center;
        min-height: 72px;
        border-radius: 8px;
        padding: 10px 16px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.22);
      }

      .hero-brand img {
        display: block;
        width: min(210px, 48vw);
        height: auto;
      }

      .home-copy {
        max-width: 760px;
        padding-top: 86px;
      }

      h1 {
        margin: 0;
        letter-spacing: 0;
      }

      .home-copy h1 {
        max-width: 720px;
        font-size: clamp(2.3rem, 7vw, 5rem);
        line-height: 0.95;
      }

      .home-copy p:last-child {
        max-width: 620px;
        margin: 22px 0 0;
        color: rgba(255, 255, 255, 0.84);
        font-size: 1.08rem;
      }

      .saved-drawer {
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 20;
        display: grid;
        justify-items: end;
        gap: 10px;
      }

      .menu-toggle {
        display: grid;
        place-items: center;
        gap: 4px;
        width: 48px;
        height: 48px;
        border: 1px solid #d3dce3;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 14px 34px rgba(34, 51, 68, 0.14);
      }

      .menu-toggle span {
        display: block;
        width: 20px;
        height: 2px;
        border-radius: 999px;
        background: #17202a;
      }

      .saved-drawer-panel {
        width: min(420px, calc(100vw - 36px));
        max-height: calc(100vh - 86px);
        overflow: auto;
        padding: 18px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: rgba(12, 22, 30, 0.94);
        box-shadow: 0 20px 46px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(8px);
      }

      .saved-inspections-header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
      }

      .saved-inspections-header h2 {
        margin: 0;
        color: #ffffff;
        font-size: 1.25rem;
      }

      .saved-inspections-list {
        display: grid;
        gap: 10px;
      }

      .saved-inspection-card {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 14px;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
      }

      .saved-inspection-card span {
        color: #8be0d3;
        font-size: 0.76rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .saved-inspection-card h3 {
        margin: 3px 0;
        color: #ffffff;
        font-size: 1.2rem;
      }

      .saved-inspection-card p,
      .saved-inspection-card small {
        margin: 0;
        color: rgba(255, 255, 255, 0.75);
      }

      .saved-inspection-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .empty-saved-message {
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: #2f8f83;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .home-view .eyebrow {
        color: #8be0d3;
      }

      .home-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .primary-action,
      .secondary-action,
      .ghost-action {
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        padding: 0 20px;
        font-weight: 800;
      }

      .primary-action {
        width: fit-content;
        background: #f2b84b;
        color: #1b2430;
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.18);
      }

      .secondary-action {
        background: #ffffff;
        color: #263442;
        border: 1px solid #d3dce3;
      }

      .ghost-action {
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.28);
      }

      .workspace-view {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 28px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 22px;
      }

      .section-header h1 {
        color: #17202a;
        font-size: clamp(1.9rem, 5vw, 3.1rem);
        line-height: 1.02;
      }

      .header-detail {
        margin: 10px 0 0;
        color: #667685;
      }

      .configuration-form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        padding: 22px;
        background: #ffffff;
        border: 1px solid #dce4ea;
        border-radius: 8px;
        box-shadow: 0 16px 44px rgba(34, 51, 68, 0.08);
      }

      label {
        display: grid;
        gap: 8px;
        color: #405160;
        font-size: 0.92rem;
        font-weight: 750;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #c8d3db;
        border-radius: 8px;
        padding: 13px 14px;
        background: #fbfcfd;
        color: #17202a;
        outline: none;
      }

      textarea {
        resize: vertical;
      }

      .full-width,
      .form-actions {
        grid-column: 1 / -1;
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
      }

      .header-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .rack-summary {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .summary-item {
        display: grid;
        gap: 4px;
        padding: 16px;
        background: #ffffff;
        border: 1px solid #dce4ea;
        border-radius: 8px;
      }

      .summary-item span {
        color: #6a7a87;
        font-size: 0.8rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .summary-item strong {
        color: #17202a;
        font-size: 1.08rem;
      }

      .rack-board-wrapper {
        overflow-x: auto;
        padding: 14px;
        background: #202a33;
        border-radius: 8px;
        box-shadow: 0 16px 44px rgba(34, 51, 68, 0.14);
      }

      .rack-visual-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 18px;
        padding: 16px 18px;
        background: #ffffff;
        border: 1px solid #dce4ea;
        border-radius: 8px 8px 0 0;
      }

      .rack-visual-toolbar h2 {
        margin: 0;
        color: #17202a;
        font-size: 1.2rem;
      }

      .rack-visual-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 12px;
        flex-wrap: wrap;
      }

      .save-message {
        color: #1f6f66;
        font-size: 0.86rem;
        font-weight: 850;
      }

      .rack-visual-toolbar + .rack-board-wrapper {
        border-radius: 0 0 8px 8px;
      }

      .rack-board {
        display: grid;
        gap: 10px;
        min-width: max-content;
      }

      .rack-board.structure-mode .rack-cell {
        border-color: #f2b84b;
      }

      .rack-cell-placeholder {
        min-height: 74px;
        border: 1px dashed rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
      }

      .rack-cell {
        display: grid;
        align-content: center;
        gap: 4px;
        min-height: 74px;
        border: 2px solid #667685;
        border-radius: 8px;
        padding: 10px;
        background: #f7fafc;
        color: #263442;
        text-align: left;
      }

      .rack-cell.selected {
        background: #2f8f83;
        border-color: #8be0d3;
        color: #ffffff;
      }

      .rack-cell.free-space {
        background: #e9edf1;
        border-color: #9aa8b4;
        color: #536472;
        border-style: dashed;
      }

      .rack-cell.has-finding {
        border-color: #d9594c;
        box-shadow: inset 0 0 0 2px rgba(217, 89, 76, 0.16);
      }

      .rack-cell.selected.has-finding {
        background: #b94a40;
        border-color: #ffd1ca;
        color: #ffffff;
      }

      .rack-cell em {
        display: block;
        width: fit-content;
        margin-top: 4px;
        border-radius: 999px;
        padding: 2px 7px;
        background: rgba(23, 32, 42, 0.08);
        color: currentColor;
        font-size: 0.72rem;
        font-style: normal;
        font-weight: 800;
      }

      .rack-cell span {
        overflow-wrap: anywhere;
      }

      .damage-badge.leve {
        background: #e9f5f3;
        color: #1f6f66;
      }

      .damage-badge.moderado {
        background: #fff5da;
        color: #8a5b00;
      }

      .damage-badge.grave {
        background: #fff1ef;
        color: #9f3028;
      }

      .damage-badge.critico {
        background: #202a33;
        color: #ffffff;
      }

      .structure-editor {
        display: grid;
        gap: 14px;
        padding: 16px;
        border: 1px solid #dce4ea;
        border-top: 0;
        background: #ffffff;
      }

      .structure-editor-main {
        display: grid;
        grid-template-columns: 1fr 140px auto;
        align-items: end;
        gap: 14px;
      }

      .structure-editor-main h2 {
        margin: 0;
        color: #17202a;
        font-size: 1.24rem;
      }

      .structure-actions,
      .structure-range {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .structure-bay-strip {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .structure-bay-strip button {
        min-width: 86px;
        border: 1px solid #c8d3db;
        border-radius: 8px;
        padding: 9px 10px;
        background: #fbfcfd;
        color: #17202a;
        font-weight: 850;
        text-align: left;
      }

      .structure-bay-strip button.selected {
        border-color: #2f8f83;
        box-shadow: 0 0 0 3px rgba(47, 143, 131, 0.15);
      }

      .structure-bay-strip span {
        display: block;
        color: #667685;
        font-size: 0.74rem;
        font-weight: 750;
      }

      .structure-range {
        align-items: end;
        justify-content: flex-start;
      }

      .structure-range label {
        width: 150px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(15, 25, 35, 0.56);
      }

      .modal-panel {
        width: min(760px, 100%);
        max-height: min(92vh, 780px);
        overflow: auto;
      }

      .cell-editor {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        padding: 22px;
        background: #ffffff;
        border: 1px solid #dce4ea;
        border-radius: 8px;
        box-shadow: 0 16px 44px rgba(34, 51, 68, 0.08);
      }

      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .cell-editor > div:first-child,
      .modal-header {
        grid-column: 1 / -1;
      }

      .cell-editor h2 {
        margin: 0;
        color: #17202a;
        font-size: 1.35rem;
      }

      .icon-action {
        display: inline-grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border: 1px solid #c8d3db;
        border-radius: 8px;
        background: #ffffff;
        color: #17202a;
        font-weight: 900;
      }

      .photo-preview {
        display: grid;
        gap: 10px;
      }

      .photo-preview img {
        width: min(260px, 100%);
        max-height: 180px;
        object-fit: cover;
        border: 1px solid #dce4ea;
        border-radius: 8px;
      }

      .bulk-rename-panel {
        display: grid;
        gap: 16px;
        margin-bottom: 18px;
        padding: 18px;
        background: #ffffff;
        border: 1px solid #dce4ea;
        border-radius: 8px;
        box-shadow: 0 16px 44px rgba(34, 51, 68, 0.08);
      }

      .bulk-rename-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .bulk-rename-header h2 {
        margin: 0;
        color: #17202a;
        font-size: 1.28rem;
      }

      .bulk-rename-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .checkbox-field {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        padding: 0 12px;
        border: 1px solid #c8d3db;
        border-radius: 8px;
        background: #fbfcfd;
      }

      .checkbox-field input {
        width: 18px;
        height: 18px;
      }

      .bulk-preview {
        display: grid;
        gap: 8px;
        padding: 12px;
        border-radius: 8px;
        background: #f8fafb;
        border: 1px dashed #c8d3db;
      }

      .bulk-preview > span {
        color: #667685;
        font-size: 0.76rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .bulk-preview div {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .bulk-preview strong {
        border-radius: 999px;
        padding: 6px 10px;
        background: #e9f5f3;
        color: #1f6f66;
        font-size: 0.86rem;
      }

      .notes-panel {
        margin-top: 18px;
        padding: 18px;
        background: #ffffff;
        border: 1px solid #dce4ea;
        border-radius: 8px;
      }

      .report-preview {
        margin-top: 22px;
        padding: 24px;
        background: #ffffff;
        border: 1px solid #dce4ea;
        border-radius: 8px;
        color: #17202a;
        box-shadow: 0 16px 44px rgba(34, 51, 68, 0.08);
      }

      .report-cover {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding-bottom: 18px;
        border-bottom: 3px solid #202a33;
      }

      .report-cover p,
      .report-cover span {
        margin: 0;
        color: #667685;
        font-weight: 800;
        text-transform: uppercase;
      }

      .report-cover h1 {
        margin: 4px 0;
        font-size: 2rem;
        line-height: 1;
      }

      .report-cover strong {
        align-self: flex-start;
        border-radius: 8px;
        padding: 10px 14px;
        background: #202a33;
        color: #ffffff;
      }

      .report-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 18px;
      }

      .report-field {
        display: grid;
        gap: 4px;
        padding: 12px;
        border: 1px solid #dce4ea;
        border-radius: 8px;
        background: #f8fafb;
      }

      .report-field span {
        color: #667685;
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .report-section {
        margin-top: 22px;
      }

      .report-section h2 {
        margin: 0 0 10px;
        color: #17202a;
        font-size: 1.15rem;
      }

      .report-section p {
        margin: 0;
        color: #536472;
      }

      .report-rack-map {
        display: grid;
        gap: 5px;
        padding: 10px;
        background: #202a33;
        border-radius: 8px;
        overflow-x: auto;
      }

      .report-map-cell {
        min-width: 42px;
        border: 1px solid #c8d3db;
        border-radius: 4px;
        padding: 6px 4px;
        background: #ffffff;
        color: #17202a;
        font-size: 0.68rem;
        font-weight: 800;
        text-align: center;
        white-space: nowrap;
      }

      .report-map-cell.free {
        background: #e9edf1;
        border-style: dashed;
        color: #536472;
      }

      .report-map-cell.finding {
        background: #fff1ef;
        border-color: #d9594c;
        color: #9f3028;
      }

      .report-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 10px;
        color: #536472;
        font-size: 0.85rem;
        font-weight: 750;
      }

      .report-legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .report-legend i {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 1px solid #c8d3db;
        border-radius: 3px;
        background: #ffffff;
      }

      .legend-free {
        background: #e9edf1 !important;
        border-style: dashed !important;
      }

      .legend-finding {
        background: #fff1ef !important;
        border-color: #d9594c !important;
      }

      .report-table {
        width: 100%;
        border-collapse: collapse;
        overflow-wrap: anywhere;
      }

      .report-table th,
      .report-table td {
        border: 1px solid #dce4ea;
        padding: 9px;
        text-align: left;
        vertical-align: top;
      }

      .report-table th {
        background: #202a33;
        color: #ffffff;
        font-size: 0.78rem;
        text-transform: uppercase;
      }

      .report-photo {
        width: 92px;
        max-height: 70px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid #dce4ea;
      }

      .report-footer {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-top: 34px;
        padding-top: 18px;
        border-top: 1px solid #dce4ea;
        color: #536472;
        font-weight: 750;
      }

      .report-topline {
        display: grid;
        grid-template-columns: 1fr 260px;
        gap: 18px;
        padding: 22px;
        background: #17202a;
        border-radius: 8px;
        color: #ffffff;
      }

      .report-brand span {
        color: #8be0d3;
        font-size: 0.78rem;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .report-brand h1 {
        margin: 8px 0 6px;
        font-size: 2.35rem;
        line-height: 1;
      }

      .report-brand p {
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 1.05rem;
      }

      .report-meta-card {
        display: grid;
        align-content: center;
        gap: 7px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
      }

      .report-meta-card strong {
        color: #f2b84b;
        font-size: 1.45rem;
      }

      .report-meta-card span {
        color: rgba(255, 255, 255, 0.82);
        font-size: 0.9rem;
      }

      .report-kpis {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .report-metric {
        display: grid;
        gap: 6px;
        padding: 14px;
        border: 1px solid #dce4ea;
        border-left: 5px solid #667685;
        border-radius: 8px;
        background: #ffffff;
      }

      .report-metric span {
        color: #667685;
        font-size: 0.75rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .report-metric strong {
        color: #17202a;
        font-size: 1.3rem;
      }

      .report-metric.danger {
        border-left-color: #d9594c;
      }

      .report-metric.muted {
        border-left-color: #9aa8b4;
      }

      .report-metric.neutral {
        border-left-color: #2f8f83;
      }

      .report-block {
        margin-top: 18px;
        padding: 18px;
        border: 1px solid #dce4ea;
        border-radius: 8px;
        background: #ffffff;
      }

      .report-block-title {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }

      .report-block-title span {
        display: inline-grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 6px;
        background: #202a33;
        color: #ffffff;
        font-size: 0.76rem;
        font-weight: 900;
      }

      .report-block-title h2 {
        margin: 0;
        color: #17202a;
        font-size: 1.08rem;
      }

      .report-data-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .report-note {
        min-height: 70px;
        padding: 12px;
        border-left: 4px solid #f2b84b;
        background: #fffaf0;
        color: #405160;
      }

      .report-table tbody tr:nth-child(even) {
        background: #f8fafb;
      }

      .report-footer div {
        display: grid;
        gap: 18px;
      }

      .report-footer span {
        color: #667685;
        font-size: 0.78rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      .report-footer strong {
        color: #17202a;
        font-weight: 700;
      }

      .report-page {
        max-width: 216mm;
        margin-inline: auto;

        background: #ffffff;
        border: 1px solid #c8d3db;
        border-radius: 0;
        color: #111111;
        font-family: Arial, Helvetica, sans-serif;

      .report-header-table,
      .report-info-table,
      .report-summary-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .report-header-table td,
      .report-info-table td,
      .report-summary-table td {
        border: 1px solid #202a33;
        padding: 8px 10px;
        vertical-align: middle;
        overflow-wrap: anywhere;
      }

      .report-logo-cell {
        width: 34mm;
        text-align: center;
        background: #f4f4f4;
      }

      .report-logo-cell img {
        max-width: 30mm;
        max-height: 20mm;
        object-fit: contain;
      }

      .report-title-cell {
        text-align: center;
      }

      .report-title-cell strong {
        display: block;
        color: #111111;
        font-size: 1rem;
        letter-spacing: 0.04em;
      }

      .report-title-cell span {
        display: block;
        margin-top: 4px;
        color: #333333;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .report-folio-cell {
        width: 42mm;
        text-align: center;
        background: #fbfbfb;
      }

      .report-folio-cell span,
      .report-info-table span,
      .report-summary-table span {
        display: block;
        color: #333333;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .report-folio-cell strong,
      .report-info-table strong,
      .report-summary-table strong {
        display: block;
        margin-top: 4px;
        color: #111111;
        font-size: 0.88rem;
        line-height: 1.35;
      }

      .report-section-banner {
        margin: 18px 0 0;
        padding: 8px 10px;
        border: 1px solid #202a33;
        border-bottom: 0;
        background: #d9d9d9;
        color: #111111;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .report-page .report-block {
        margin-top: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        break-inside: avoid;
      }

      .report-summary-panel {
        display: grid;
        gap: 10px;
        padding: 10px;
        border: 1px solid #202a33;
      }

      .report-summary-cards {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .report-summary-cards div,
      .report-summary-note {
        border: 1px solid #c8d3db;
        background: #fbfbfb;
        padding: 9px 10px;
      }

      .report-summary-cards span,
      .report-summary-note span {
        display: block;
        color: #333333;
        font-size: 0.68rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .report-summary-cards strong {
        display: block;
        margin-top: 4px;
        color: #111111;
        font-size: 1.05rem;
        line-height: 1.2;
      }

      .report-summary-note {
        min-height: 20mm;
      }

      .report-summary-note p {
        margin: 7px 0 0;
        color: #222222;
        line-height: 1.45;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .report-page .report-rack-map {
        border: 1px solid #202a33;
        border-radius: 0;
        background: #202a33;
      }

      .report-page .report-map-cell {
        min-width: 54px;
        border-radius: 0;
        padding: 7px 5px;
        font-size: 0.58rem;
      }

      .report-page .report-table {
        border: 1px solid #202a33;
        font-size: 0.78rem;
        table-layout: fixed;
      }

      .report-page .report-table th {
        background: #efefef;
        color: #111111;
        border-color: #202a33;
        font-size: 0.68rem;
      }

      .report-page .report-table td {
        border-color: #202a33;
        overflow-wrap: anywhere;
        line-height: 1.35;
      }

      .report-evidence-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        padding: 10px;
        border: 1px solid #202a33;
      }

      .report-evidence-card {
        display: grid;
        gap: 7px;
        margin: 0;
        break-inside: avoid;
      }

      .report-evidence-card img {
        width: 100%;
        height: 46mm;
        object-fit: contain;
        border: 1px solid #202a33;
        background: #ffffff;
      }

      .report-evidence-card figcaption {
        display: grid;
        gap: 2px;
        color: #333333;
        font-size: 0.74rem;
      }

      .report-evidence-card figcaption strong {
        color: #111111;
      }

      .report-page .report-footer {
        grid-template-columns: 1fr 1fr;
        border-top-color: #202a33;
        color: #333333;
      }

      .report-page .report-footer p {
        grid-column: 1 / -1;
        margin: 0;
        color: #666666;
        font-size: 0.72rem;
        text-align: center;
      }

      @media (max-width: 760px) {
        .home-view,
        .workspace-view {
          padding: 20px;
        }

        .hero-brand {
          position: static;
          width: fit-content;
          min-height: 60px;
          padding: 8px 12px;
        }

        .hero-brand img {
          width: min(180px, 72vw);
        }

        .home-copy {
          padding-top: 0;
        }

        .saved-inspections-header,
        .saved-inspection-card {
          display: grid;
        }

        .saved-inspection-actions {
          justify-content: stretch;
        }

        .section-header {
          display: grid;
        }

        .rack-visual-toolbar {
          display: grid;
        }

        .structure-editor-main,
        .structure-range {
          display: grid;
        }

        .structure-range label {
          width: 100%;
        }

        .configuration-form,
        .cell-editor,
        .bulk-rename-grid,
        .report-grid,
        .report-kpis,
        .report-topline,
        .report-data-grid,
        .report-footer,
        .rack-summary {
          grid-template-columns: 1fr;
        }

        .report-cover {
          display: grid;
        }

        .bulk-rename-header {
          display: grid;
        }

        .home-actions,
        .rack-visual-actions {
          justify-content: stretch;
        }

        .primary-action,
        .secondary-action,
        .ghost-action {
          width: 100%;
        }

        .rack-board-wrapper {
          margin-inline: -20px;
          border-radius: 0;
        }
      }

      @media print {
        @page {
          size: letter;
          margin: 20mm 18mm;
        }

        :root,
        body {
          background: #ffffff;
          color: #111111;
          font-size: 12px;
        }

        .workspace-view > .section-header,
        .saved-drawer,
        .rack-summary,
        .rack-visual-toolbar,
        .structure-editor,
        .rack-board-wrapper,
        .cell-editor,
        .bulk-rename-panel,
        .notes-panel {
          display: none !important;
        }

        .workspace-view {
          width: 100%;
          padding: 0;
        }

        .report-preview {
          display: block;
          margin: 0;
          padding: 0;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }

        .report-page {
          max-width: none;
          width: 100%;
          padding: 4mm;
          box-shadow: none;
        }

        .report-cover,
        .report-topline,
        .report-section,
        .report-block,
        .report-table,
        .report-footer {
          break-inside: avoid;
        }

        .report-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .report-topline {
          grid-template-columns: 1fr 220px;
          padding: 16px;
          color-adjust: exact;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        .report-brand h1 {
          font-size: 1.8rem;
        }

        .report-kpis {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .report-data-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .report-block {
          margin-top: 0;
          padding: 0;
        }

        .report-section-banner {
          margin-top: 16px;
        }

        .report-summary-cards {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .report-rack-map {
          background: #ffffff;
          border: 1px solid #202a33;
        }

        .report-map-cell {
          color-adjust: exact;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

        .primary-action,
        .secondary-action,
        .ghost-action {
          display: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <section class="home-view" data-screen="home">
        <div class="hero-brand" aria-label="FMC Industrial">
          <img src="logo.png" alt="FMC Industrial">
        </div>

        <div class="home-copy">
          <p class="eyebrow">FMC Industrial</p>
          <h1>Inspeccion de racks industriales</h1>
          <p>
            Crea la estructura del rack antes de revisarlo y trabaja con una cuadricula visual
            adaptada a cada empresa, area y numero de rack.
          </p>
        </div>
        <div class="home-actions">
          <button class="primary-action" type="button" data-action="new-inspection">
            Nueva inspeccion
          </button>
        </div>
      </section>
    </div>
    <script>
      const damageLevels = [
        { value: 'none', label: 'Sin dano' },
        { value: 'leve', label: 'Leve' },
        { value: 'moderado', label: 'Moderado' },
        { value: 'grave', label: 'Grave' },
        { value: 'critico', label: 'Critico' },
      ];

      function createBayLevels(bays, levels) {
        return Array.from({ length: Math.max(1, Number(bays)) }, (_, index) => index + 1)
          .reduce((levelsByBay, bay) => ({
            ...levelsByBay,
            [bay]: Math.max(1, Number(levels)),
          }), {});
      }

      function normalizeBayLevels(config, bayLevels) {
        if (!config) return {};

        return Array.from({ length: config.bays }, (_, index) => index + 1)
          .reduce((levelsByBay, bay) => ({
            ...levelsByBay,
            [bay]: Math.max(1, Number(bayLevels?.[bay] || config.levels || 1)),
          }), {});
      }

      function detailHasData(detail) {
        return Boolean(
          detail?.finding ||
          detail?.photo ||
          detail?.status === 'free' ||
          (detail?.damageLevel && detail.damageLevel !== 'none')
        );
      }

      function formatPositionName(config, position) {
        const rack = String(config?.rackNumber || '01').trim().padStart(2, '0');
        const bay = String(position.bay).padStart(3, '0');
        const level = String(position.level).padStart(2, '0');
        return `${rack}-${bay}-${level}`;
      }

      const storageKey = 'fmcRackInspections.v1';
      const legacyStorageKey = 'fmcRackInspection.current';

      function createInspectionId() {
        return `inspection-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function loadSavedInspections() {
        try {
          const savedInspections = localStorage.getItem(storageKey);
          if (savedInspections) {
            return JSON.parse(savedInspections).map((inspection) => ({
              ...inspection,
              config: inspection.config || inspection.rackConfig || null,
            }));
          }

          const legacyInspection = localStorage.getItem(legacyStorageKey);
          if (!legacyInspection) return [];

          const parsedInspection = JSON.parse(legacyInspection);

          return [{
            id: createInspectionId(),
            config: parsedInspection.config || parsedInspection.rackConfig || null,
            bayLevels: normalizeBayLevels(
              parsedInspection.config || parsedInspection.rackConfig,
              parsedInspection.bayLevels
            ),
            selectedCell: parsedInspection.selectedCell || null,
            cellDetails: parsedInspection.cellDetails || {},
            bulkRename: parsedInspection.bulkRename || {
              rackName: parsedInspection.config?.rackNumber || parsedInspection.rackConfig?.rackNumber || '01',
              bayNumber: '001',
              levelNumber: '01',
            },
            updatedAt: parsedInspection.savedAt || new Date().toISOString(),
          }];
        } catch {
          return [];
        }
      }

      function saveInspections() {
        localStorage.setItem(storageKey, JSON.stringify(appState.inspections));
      }

      function saveCurrentInspection() {
        if (!appState.activeInspectionId || !hasActiveWork()) return;

        const updatedAt = new Date().toISOString();
        const nextInspection = {
          id: appState.activeInspectionId,
          config: appState.config,
          bayLevels: appState.bayLevels,
          selectedCell: appState.selectedCell,
          cellDetails: appState.cellDetails,
          bulkRename: appState.bulkRename,
          companyName: appState.config?.companyName || '',
          rackArea: appState.config?.rackArea || '',
          rackNumber: appState.config?.rackNumber || '',
          rackType: appState.config?.rackType || '',
          updatedAt,
        };

        const existingIndex = appState.inspections.findIndex((inspection) => (
          inspection.id === appState.activeInspectionId
        ));

        if (existingIndex === -1) {
          appState.inspections.unshift(nextInspection);
        } else {
          appState.inspections[existingIndex] = nextInspection;
        }

        appState.inspections.sort((first, second) => (
          (second.updatedAt || '').localeCompare(first.updatedAt || '')
        ));
        saveInspections();
      }

      function hasActiveWork() {
        return Boolean(appState.config || Object.keys(appState.cellDetails).length);
      }

      const appState = {
        inspections: loadSavedInspections(),
        activeInspectionId: null,
        savedPanelOpen: false,
        saveMessage: '',
        structureMode: false,
        selectedBay: 1,
        copiedLevelCount: null,
        structureRange: {
          fromBay: 1,
          toBay: 4,
          levels: 3,
        },
        config: null,
        bayLevels: {},
        selectedCell: null,
        draftPhotos: {},
        cellDetails: {},
        bulkRename: {
          rackName: '01',
          bayNumber: '001',
          levelNumber: '01',
        },
      };

      const root = document.getElementById('root');

      if (appState.inspections.length > 0) saveInspections();

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function renderSavedInspectionCard(inspection) {
        const config = inspection.config || inspection.rackConfig || {};
        const form = inspection.form || {};
        const companyName = inspection.companyName || config.companyName || form.companyName || 'Empresa sin nombre';
        const rackArea = inspection.rackArea || config.rackArea || form.rackArea || 'Area sin capturar';
        const rackNumber = inspection.rackNumber || config.rackNumber || form.rackNumber || 'Sin rack';
        const rackType = inspection.rackType || config.rackType || form.rackType || 'Tipo pendiente';
        const updatedAt = inspection.updatedAt
          ? new Date(inspection.updatedAt).toLocaleDateString('es-MX')
          : 'Sin fecha';

        return `
          <article class="saved-inspection-card">
            <div>
              <span>${escapeHtml(companyName)}</span>
              <h3>Rack ${escapeHtml(rackNumber)}</h3>
              <p>${escapeHtml(rackArea)} / ${escapeHtml(rackType)}</p>
              <small>Actualizada: ${escapeHtml(updatedAt)}</small>
            </div>
            <div class="saved-inspection-actions">
              <button class="secondary-action" type="button" data-action="open-inspection" data-inspection-id="${escapeHtml(inspection.id)}">Abrir</button>
              <button class="ghost-action" type="button" data-action="delete-inspection" data-inspection-id="${escapeHtml(inspection.id)}">Borrar</button>
            </div>
          </article>
        `;
      }

      function renderSavedInspectionsMenu() {
        return `
          <aside class="saved-drawer" aria-label="Archivo de inspecciones">
            <button class="menu-toggle" type="button" data-action="toggle-saved-panel" aria-label="Abrir archivo">
              <span></span>
              <span></span>
              <span></span>
            </button>
            ${appState.savedPanelOpen ? `
              <div class="saved-drawer-panel">
                <div class="saved-inspections-header">
                  <p class="eyebrow">Archivo local</p>
                  <h2>Inspecciones guardadas</h2>
                </div>
                ${
                  appState.inspections.length > 0
                    ? `<div class="saved-inspections-list">${appState.inspections.map(renderSavedInspectionCard).join('')}</div>`
                    : '<p class="empty-saved-message">No hay inspecciones guardadas todavia.</p>'
                }
              </div>
            ` : ''}
          </aside>
        `;
      }

      function renderHome() {
        root.innerHTML = `
          ${renderSavedInspectionsMenu()}
          <section class="home-view" data-screen="home">
            <div class="hero-brand" aria-label="FMC Industrial">
              <img src="logo.png" alt="FMC Industrial">
            </div>
            <div class="home-copy">
              <p class="eyebrow">FMC Industrial</p>
              <h1>Inspeccion de racks industriales</h1>
              <p>Crea la estructura del rack antes de revisarlo y trabaja con una cuadricula visual adaptada a cada empresa, area y numero de rack.</p>
            </div>
            <div class="home-actions">
              <button class="primary-action" type="button" data-action="new-inspection">Nueva inspeccion</button>
            </div>
          </section>
        `;
      }

      function renderConfiguration() {
        const config = appState.config || {};
        root.innerHTML = `
          ${renderSavedInspectionsMenu()}
          <section class="workspace-view" data-screen="configuration">
            <header class="section-header">
              <div>
                <p class="eyebrow">Primer paso</p>
                <h1>Configuracion del Rack</h1>
              </div>
              <button class="secondary-action" type="button" data-action="home">Volver</button>
            </header>
            <form class="configuration-form" data-form="rack-config">
              <label><span>Nombre de la empresa</span><input name="companyName" value="${escapeHtml(config.companyName || '')}" placeholder="Ej. Manufacturas Norte" required></label>
              <label><span>Area o ubicacion del rack</span><input name="rackArea" value="${escapeHtml(config.rackArea || '')}" placeholder="Ej. Almacen A - Pasillo 3" required></label>
              <label><span>Numero de rack</span><input name="rackNumber" value="${escapeHtml(config.rackNumber || '')}" placeholder="Ej. R-014" required></label>
              <label>
                <span>Tipo de rack</span>
                <select name="rackType" required>
                  <option value="">Seleccionar tipo</option>
                  ${['Selectivo', 'Drive-in', 'Push-back', 'Cantilever', 'Dinamico', 'Otro'].map((rackType) => (
                    `<option${config.rackType === rackType ? ' selected' : ''}>${rackType}</option>`
                  )).join('')}
                </select>
              </label>
              <label><span>Cantidad de bahias</span><input name="bays" type="number" min="1" max="30" value="${escapeHtml(config.bays || 4)}" required></label>
              <label><span>Cantidad de niveles</span><input name="levels" type="number" min="1" max="20" value="${escapeHtml(config.levels || 3)}" required></label>
              <label class="full-width"><span>Observaciones generales</span><textarea name="observations" rows="4" placeholder="Condiciones generales, referencias del area o notas iniciales.">${escapeHtml(config.observations || '')}</textarea></label>
              <div class="form-actions"><button class="primary-action" type="submit">Guardar configuracion</button></div>
            </form>
          </section>
        `;
      }

      function renderRack() {
        const config = appState.config;
        appState.bayLevels = normalizeBayLevels(config, appState.bayLevels);
        const cells = [];
        const positions = [];
        const maxLevels = Math.max(...Object.values(appState.bayLevels), 1);

        for (let level = maxLevels; level >= 1; level -= 1) {
          for (let bay = 1; bay <= config.bays; bay += 1) {
            if (level > appState.bayLevels[bay]) {
              cells.push(`<div class="rack-cell-placeholder" aria-hidden="true"></div>`);
              continue;
            }

            const id = `B${bay}-N${level}`;
            positions.push({ id, bay, level });
            const detail = appState.cellDetails[id] || {};
            const selectedClass = appState.selectedCell === id ? ' selected' : '';
            const freeClass = detail.status === 'free' ? ' free-space' : '';
            const findingClass = detail.finding ? ' has-finding' : '';
            const locationName = detail.locationName || formatPositionName(config, { bay, level });
            const findingLabel = detail.finding || 'Sin hallazgo';
            const damageLevel = damageLevels.find((levelItem) => levelItem.value === detail.damageLevel);
            cells.push(`
              <button class="rack-cell${selectedClass}${freeClass}${findingClass}" type="button" data-cell="${id}" data-bay="${bay}" data-level="${level}">
                <strong>${escapeHtml(locationName)}</strong>
                ${damageLevel && detail.damageLevel !== 'none' ? `<em class="damage-badge ${detail.damageLevel}">${escapeHtml(damageLevel.label)}</em>` : ''}
                <span>${escapeHtml(findingLabel)}</span>
              </button>
            `);
          }
        }

        const selectedLabel = appState.selectedCell
          ? selectedLabelFor(appState.selectedCell)
          : 'Sin seleccionar';
        const editor = appState.selectedCell ? renderCellEditor(appState.selectedCell) : '';
        const bulkRenamePanel = renderBulkRenamePanel(positions);
        const reportItems = positions
          .map((position) => ({
            ...position,
            detail: appState.cellDetails[position.id] || {},
          }))
          .filter((position) => position.detail.status === 'free' || position.detail.finding || position.detail.photo);
        const findingCount = reportItems.filter((position) => position.detail.finding).length;
        const freeSpaceCount = reportItems.filter((position) => position.detail.status === 'free').length;
        const report = renderReportPreview(positions, reportItems, findingCount, freeSpaceCount);

        root.innerHTML = `
          ${renderSavedInspectionsMenu()}
          <section class="workspace-view" data-screen="rack">
            <header class="section-header">
              <div>
                <p class="eyebrow">Rack generado</p>
                <h1>${escapeHtml(config.companyName)}</h1>
                <p class="header-detail">${escapeHtml(config.rackArea)} / Rack ${escapeHtml(config.rackNumber)} / ${escapeHtml(config.rackType)}</p>
              </div>
              <div class="header-actions">
                <button class="secondary-action" type="button" data-action="configure">Editar</button>
                <button class="secondary-action" type="button" data-action="new-inspection">Nueva</button>
                <button class="primary-action" type="button" data-action="print-report">Generar PDF</button>
              </div>
            </header>
            <div class="rack-summary">
              <div class="summary-item"><span>Bahias</span><strong>${config.bays}</strong></div>

      function selectedLabelFor(cellId) {
        const detail = appState.cellDetails[cellId];
        if (detail?.locationName) return detail.locationName;

        const level = cellId.match(/N(\d+)/)[1];
        return formatPositionName(appState.config, { bay, level });
      }

      function setBayLevelCount(bay, nextLevelCount) {
        const safeLevelCount = Math.max(1, Number(nextLevelCount));
        const currentLevelCount = Number(appState.bayLevels[bay] || appState.config.levels || 1);

        if (safeLevelCount < currentLevelCount) {
          const removedIds = Array.from(
            { length: currentLevelCount - safeLevelCount },
            (_, index) => `B${bay}-N${safeLevelCount + index + 1}`
          );
          const hasData = removedIds.some((cellId) => detailHasData(appState.cellDetails[cellId]));

          if (
            hasData &&
            !window.confirm('Este nivel tiene hallazgos registrados. Seguro que deseas eliminarlo?')
          ) {
            return;
          }

          removedIds.forEach((cellId) => {
            delete appState.cellDetails[cellId];
          });
        }

        appState.bayLevels[bay] = safeLevelCount;
        appState.selectedCell = null;
        saveCurrentInspection();
      }

      function applyBayLevelRange(fromBay, toBay, nextLevelCount) {
        const startBay = Math.max(1, Math.min(Number(fromBay), Number(toBay)));
        const endBay = Math.min(appState.config.bays, Math.max(Number(fromBay), Number(toBay)));
        const safeLevelCount = Math.max(1, Number(nextLevelCount));
        const normalizedLevels = normalizeBayLevels(appState.config, appState.bayLevels);
        const removedIds = [];

        for (let bay = startBay; bay <= endBay; bay += 1) {
          const currentLevelCount = normalizedLevels[bay] || appState.config.levels || 1;
          if (safeLevelCount < currentLevelCount) {
            removedIds.push(...Array.from(
              { length: currentLevelCount - safeLevelCount },
              (_, index) => `B${bay}-N${safeLevelCount + index + 1}`
            ));
          }
        }

        const hasData = removedIds.some((cellId) => detailHasData(appState.cellDetails[cellId]));

        if (
          hasData &&
          !window.confirm('Este nivel tiene hallazgos registrados. Seguro que deseas eliminarlo?')
        ) {
          return;
        }

        removedIds.forEach((cellId) => {
          delete appState.cellDetails[cellId];
        });

        for (let bay = startBay; bay <= endBay; bay += 1) {
          appState.bayLevels[bay] = safeLevelCount;
        }

        appState.selectedCell = null;
        saveCurrentInspection();
      }

      function renderCellEditor(cellId) {
        const bay = cellId.match(/B(\d+)/)[1];
        const level = cellId.match(/N(\d+)/)[1];
        const detail = appState.cellDetails[cellId] || {};
        const photo = appState.draftPhotos[cellId] || detail.photo || '';

        return `
          <div class="modal-backdrop" role="presentation">
            <form class="cell-editor modal-panel" data-form="cell-editor" data-cell-id="${cellId}">

                  <p class="eyebrow">Posicion seleccionada</p>
                  <h2>Bahia ${bay} / Nivel ${level}</h2>
                </div>
                <button class="icon-action" type="button" data-action="close-editor" aria-label="Cerrar">x</button>
              </div>
              <label>
                <span>Nombre de ubicacion</span>

              </label>

                <select name="status">
                  <option value="normal"${detail.status !== 'free' ? ' selected' : ''}>Posicion normal</option>

                </select>

              <label>

                <select name="damageLevel">
                  ${damageLevels.map((levelItem) => (
                    `<option value="${levelItem.value}"${(detail.damageLevel || 'none') === levelItem.value ? ' selected' : ''}>${levelItem.label}</option>`
                  )).join('')}
                </select>
              </label>
              <label class="full-width">
                <span>Hallazgo</span>
                <textarea name="finding" rows="4" placeholder="Describe golpe, deformacion, falta de anclaje, corrosion u otro hallazgo.">${escapeHtml(detail.finding || '')}</textarea>
              </label>
              <label class="full-width">
                <span>Foto</span>
                <input data-photo-input="${cellId}" type="file" accept="image/*">
              </label>
              ${photo ? `
                <div class="photo-preview full-width">
                  <img src="${photo}" alt="Vista previa">
                  <button class="secondary-action" type="button" data-action="remove-photo" data-cell-id="${cellId}">Quitar foto</button>
                </div>
              ` : ''}
              <div class="form-actions">
                <button class="secondary-action" type="button" data-action="close-editor">Cancelar</button>
                <button class="primary-action" type="submit">Guardar posicion</button>
              </div>
            </form>
          </div>
        `;

      root.addEventListener('click', (event) => {
        const action = event.target.closest('[data-action]')?.dataset.action;
        const inspectionId = event.target.closest('[data-inspection-id]')?.dataset.inspectionId;
        const cell = event.target.closest('[data-cell]');

        if (action === 'toggle-saved-panel') {
          const currentScreen = root.querySelector('[data-screen]')?.dataset.screen;
          appState.savedPanelOpen = !appState.savedPanelOpen;
          if (currentScreen === 'rack' && appState.config) renderRack();
          else if (currentScreen === 'configuration') renderConfiguration();
          else renderHome();
        }

        if (action === 'new-inspection') {
          appState.activeInspectionId = createInspectionId();
          appState.savedPanelOpen = false;
          appState.structureMode = false;
          appState.config = null;
          appState.bayLevels = {};
          appState.selectedCell = null;
          appState.cellDetails = {};
          appState.bulkRename = {
            rackName: '01',
            bayNumber: '001',
            levelNumber: '01',
          };
          renderConfiguration();
        }

        if (action === 'home') renderHome();
        if (action === 'configure') renderConfiguration();

        if (action === 'open-inspection' && inspectionId) {
          const inspection = appState.inspections.find((currentInspection) => (
            currentInspection.id === inspectionId
          ));

          if (inspection) {
            appState.activeInspectionId = inspection.id;
            appState.savedPanelOpen = false;
            appState.config = inspection.config || inspection.rackConfig || null;
            appState.bayLevels = normalizeBayLevels(appState.config, inspection.bayLevels);
            appState.selectedCell = inspection.selectedCell || null;
            appState.cellDetails = inspection.cellDetails || {};
            appState.bulkRename = inspection.bulkRename || {
              rackName: appState.config?.rackNumber || '01',
              bayNumber: '001',
              levelNumber: '01',
            };

            if (appState.config) renderRack();
            else renderConfiguration();
          }
        }

        if (action === 'delete-inspection' && inspectionId) {
          appState.inspections = appState.inspections.filter((inspection) => (
            inspection.id !== inspectionId
          ));
          saveInspections();

          if (appState.activeInspectionId === inspectionId) {
            appState.activeInspectionId = null;
            appState.config = null;
            appState.bayLevels = {};
            appState.selectedCell = null;
            appState.cellDetails = {};
          }

          renderHome();
        }
        if (action === 'save-current') {
          if (!appState.activeInspectionId) appState.activeInspectionId = createInspectionId();
          saveCurrentInspection();
          appState.saveMessage = 'Guardado';
          renderRack();
          window.setTimeout(() => {
            appState.saveMessage = '';
            if (root.querySelector('[data-screen="rack"]')) renderRack();
          }, 1800);
        }
        if (action === 'toggle-structure') {
          appState.structureMode = !appState.structureMode;
          appState.selectedCell = null;
          renderRack();
        }
        if (action === 'select-structure-bay') {
          appState.selectedBay = Number(event.target.closest('[data-bay]').dataset.bay);
          renderRack();
        }
        if (action === 'add-level') {
          setBayLevelCount(appState.selectedBay, (appState.bayLevels[appState.selectedBay] || 1) + 1);
          renderRack();
        }
        if (action === 'remove-level') {
          setBayLevelCount(appState.selectedBay, (appState.bayLevels[appState.selectedBay] || 1) - 1);
          renderRack();
        }
        if (action === 'copy-structure') {
          appState.copiedLevelCount = appState.bayLevels[appState.selectedBay];
          renderRack();
        }
        if (action === 'paste-structure' && appState.copiedLevelCount) {
          setBayLevelCount(appState.selectedBay, appState.copiedLevelCount);
          renderRack();
        }
        if (action === 'close-editor') {
          appState.selectedCell = null;
          renderRack();
        }
        if (action === 'remove-photo') {
          const cellId = event.target.closest('[data-cell-id]')?.dataset.cellId || appState.selectedCell;
          delete appState.draftPhotos[cellId];
          appState.cellDetails[cellId] = {
            ...(appState.cellDetails[cellId] || {}),
            photo: '',
          };
          saveCurrentInspection();
          renderRack();
        }
        if (action === 'print-report') window.print();

        if (cell) {
          if (appState.structureMode) {
            appState.selectedBay = Number(cell.dataset.bay);
            renderRack();
            return;
          }
          appState.selectedCell = cell.dataset.cell;
          saveCurrentInspection();
          renderRack();
        }
      });

      root.addEventListener('change', (event) => {
        if (event.target.matches('[data-action="set-selected-bay-levels"]')) {
          setBayLevelCount(appState.selectedBay, event.target.value);
          renderRack();
          return;
        }

        if (event.target.matches('[data-photo-input]')) {
          const cellId = event.target.dataset.photoInput;
          const file = event.target.files?.[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = () => {
            appState.draftPhotos[cellId] = String(reader.result);
            renderRack();
          };
          reader.readAsDataURL(file);
          return;
        }

        if (!event.target.closest('[data-form="bulk-rename"]')) return;
        const form = event.target.closest('[data-form="bulk-rename"]');
        const formData = new FormData(form);

        appState.bulkRename = {
          rackName: String(formData.get('rackName')),
          bayNumber: String(formData.get('bayNumber')),
          levelNumber: String(formData.get('levelNumber')),
        };

        saveCurrentInspection();
        renderRack();
      });

      root.addEventListener('submit', (event) => {
        if (event.target.matches('[data-form="structure-range"]')) {
          event.preventDefault();
          const formData = new FormData(event.target);
          appState.structureRange = {
            fromBay: Number(formData.get('fromBay')),
            toBay: Number(formData.get('toBay')),
            levels: Number(formData.get('levels')),
          };
          applyBayLevelRange(
            appState.structureRange.fromBay,
            appState.structureRange.toBay,
            appState.structureRange.levels
          );
          renderRack();
          return;
        }

        if (!event.target.matches('[data-form="rack-config"]')) return;
        event.preventDefault();

        const formData = new FormData(event.target);
        if (!appState.activeInspectionId) appState.activeInspectionId = createInspectionId();

        appState.config = {
          companyName: String(formData.get('companyName')).trim(),
          rackArea: String(formData.get('rackArea')).trim(),
          rackNumber: String(formData.get('rackNumber')).trim(),
          rackType: String(formData.get('rackType')).trim(),
          bays: Math.max(1, Number(formData.get('bays'))),
          levels: Math.max(1, Number(formData.get('levels'))),
          observations: String(formData.get('observations')).trim(),
        };
        appState.bayLevels = createBayLevels(appState.config.bays, appState.config.levels);
        appState.structureRange = {
          fromBay: 1,
          toBay: Math.min(appState.config.bays, 10),
          levels: appState.config.levels,
        };
        appState.selectedCell = null;
        appState.cellDetails = {};
        saveCurrentInspection();
        renderRack();
      });

      root.addEventListener('submit', (event) => {
        if (!event.target.matches('[data-form="cell-editor"]')) return;
        event.preventDefault();

        const formData = new FormData(event.target);
        const cellId = event.target.dataset.cellId;

        appState.cellDetails[cellId] = {
          locationName: String(formData.get('locationName')).trim(),
          status: String(formData.get('status')),
          damageLevel: String(formData.get('damageLevel') || 'none'),
          finding: String(formData.get('finding')).trim(),
          photo: appState.draftPhotos[cellId] || appState.cellDetails[cellId]?.photo || '',
        };

        delete appState.draftPhotos[cellId];
        appState.selectedCell = null;
        saveCurrentInspection();
        renderRack();
      });

      root.addEventListener('submit', (event) => {
        if (!event.target.matches('[data-form="bulk-rename"]')) return;
        event.preventDefault();

        const formData = new FormData(event.target);
        appState.bulkRename = {
          rackName: String(formData.get('rackName')),
          bayNumber: String(formData.get('bayNumber')),
          levelNumber: String(formData.get('levelNumber')),
        };

        const positions = [];
        for (let level = appState.config.levels; level >= 1; level -= 1) {
          for (let bay = 1; bay <= appState.config.bays; bay += 1) {
            positions.push({ id: `B${bay}-N${level}`, bay, level });
          }
        }

        positions.forEach((position) => {
          appState.cellDetails[position.id] = {
            ...(appState.cellDetails[position.id] || {}),
            locationName: buildBulkLocationName(position, positions, appState.bulkRename),
          };
        });

        saveCurrentInspection();
        renderRack();
      });

      renderHome();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
